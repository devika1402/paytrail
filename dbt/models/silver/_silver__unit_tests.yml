version: 2

# Unit tests prove the trust-manufacturing logic deterministically, with crafted
# inputs, because real PaySim data is clean (0 natural quarantine, 0 dups), so
# only mocked inputs can exercise the quarantine and dedup paths. These are model
# LOGIC tests (mock in, expected out), distinct from the data tests that assert
# properties of the real tables.

unit_tests:
  - name: stg_quarantines_each_contract_breach
    description: Every data-contract breach maps to the right _quarantine_reason; a clean row is NULL.
    model: stg_transactions
    given:
      - input: source('bronze', 'transactions_raw')
        rows:
          # clean row -> not quarantined
          - {step: '1', type: 'PAYMENT', amount: '100.00', nameOrig: 'C1', oldbalanceOrg: '100', newbalanceOrig: '0', nameDest: 'M1', oldbalanceDest: '0', newbalanceDest: '0', isFraud: '0', isFlaggedFraud: '0', _source_file: 'x', _load_ts: '2026-07-02 00:00:00'}
          # empty destination id -> null_account_key
          - {step: '1', type: 'PAYMENT', amount: '100.00', nameOrig: 'C1', oldbalanceOrg: '100', newbalanceOrig: '0', nameDest: '', oldbalanceDest: '0', newbalanceDest: '0', isFraud: '0', isFlaggedFraud: '0', _source_file: 'x', _load_ts: '2026-07-02 00:00:00'}
          # step 0 -> invalid_step
          - {step: '0', type: 'PAYMENT', amount: '100.00', nameOrig: 'C1', oldbalanceOrg: '100', newbalanceOrig: '0', nameDest: 'M1', oldbalanceDest: '0', newbalanceDest: '0', isFraud: '0', isFlaggedFraud: '0', _source_file: 'x', _load_ts: '2026-07-02 00:00:00'}
          # non-numeric amount -> unparseable_amount
          - {step: '1', type: 'PAYMENT', amount: 'abc', nameOrig: 'C1', oldbalanceOrg: '100', newbalanceOrig: '0', nameDest: 'M1', oldbalanceDest: '0', newbalanceDest: '0', isFraud: '0', isFlaggedFraud: '0', _source_file: 'x', _load_ts: '2026-07-02 00:00:00'}
          # negative amount -> negative_amount
          - {step: '1', type: 'PAYMENT', amount: '-5.00', nameOrig: 'C1', oldbalanceOrg: '100', newbalanceOrig: '0', nameDest: 'M1', oldbalanceDest: '0', newbalanceDest: '0', isFraud: '0', isFlaggedFraud: '0', _source_file: 'x', _load_ts: '2026-07-02 00:00:00'}
          # negative balance -> negative_balance
          - {step: '1', type: 'PAYMENT', amount: '100.00', nameOrig: 'C1', oldbalanceOrg: '-1', newbalanceOrig: '0', nameDest: 'M1', oldbalanceDest: '0', newbalanceDest: '0', isFraud: '0', isFlaggedFraud: '0', _source_file: 'x', _load_ts: '2026-07-02 00:00:00'}
          # unrecognised actor prefix -> unknown_actor_type
          - {step: '1', type: 'PAYMENT', amount: '100.00', nameOrig: 'X1', oldbalanceOrg: '100', newbalanceOrig: '0', nameDest: 'M1', oldbalanceDest: '0', newbalanceDest: '0', isFraud: '0', isFlaggedFraud: '0', _source_file: 'x', _load_ts: '2026-07-02 00:00:00'}
    expect:
      rows:
        - {_quarantine_reason: null}
        - {_quarantine_reason: 'null_account_key'}
        - {_quarantine_reason: 'invalid_step'}
        - {_quarantine_reason: 'unparseable_amount'}
        - {_quarantine_reason: 'negative_amount'}
        - {_quarantine_reason: 'negative_balance'}
        - {_quarantine_reason: 'unknown_actor_type'}

  - name: transactions_dedup_keeps_latest_load
    description: Same grain loaded twice collapses to one row, keeping the latest _load_ts (a correction supersedes).
    model: transactions
    given:
      - input: ref('stg_transactions')
        rows:
          # same transaction_id, two loads -> keep the later _load_ts
          - {transaction_id: 'txn_a', event_ts: '2023-01-01 00:00:00', step_num: 1, txn_type: 'PAYMENT', amount: 100.00, orig_account_key: 'o1', orig_account_type: 'customer', old_balance_orig: 100, new_balance_orig: 0, dest_account_key: 'd1', dest_account_type: 'merchant', old_balance_dest: 0, new_balance_dest: 0, is_fraud: false, is_flagged_fraud: false, _source_file: 'x', _load_ts: '2026-07-02 00:00:00', _quarantine_reason: null}
          - {transaction_id: 'txn_a', event_ts: '2023-01-01 00:00:00', step_num: 1, txn_type: 'PAYMENT', amount: 999.00, orig_account_key: 'o1', orig_account_type: 'customer', old_balance_orig: 100, new_balance_orig: 0, dest_account_key: 'd1', dest_account_type: 'merchant', old_balance_dest: 0, new_balance_dest: 0, is_fraud: false, is_flagged_fraud: false, _source_file: 'x', _load_ts: '2026-07-03 00:00:00', _quarantine_reason: null}
          # a distinct grain -> kept
          - {transaction_id: 'txn_b', event_ts: '2023-01-01 01:00:00', step_num: 2, txn_type: 'CASH_OUT', amount: 50.00, orig_account_key: 'o2', orig_account_type: 'customer', old_balance_orig: 50, new_balance_orig: 0, dest_account_key: 'd2', dest_account_type: 'customer', old_balance_dest: 0, new_balance_dest: 50, is_fraud: false, is_flagged_fraud: false, _source_file: 'x', _load_ts: '2026-07-02 00:00:00', _quarantine_reason: null}
    expect:
      rows:
        - {transaction_id: 'txn_a', amount: 999.00, _load_ts: '2026-07-03 00:00:00'}
        - {transaction_id: 'txn_b', amount: 50.00, _load_ts: '2026-07-02 00:00:00'}
